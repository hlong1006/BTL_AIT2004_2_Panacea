version: '3.8'

services:
  blood-cell-analyzer:
    build:
      context: .
      dockerfile: Dockerfile
    image: blood-cell-analyzer:latest
    container_name: blood-cell-analyzer

    volumes:
      - ./data:/app/data
      - ./outputs:/app/outputs
      - ./models:/app/models
      - ./uploads:/app/uploads
      - ./results:/app/results

    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONPATH=/app
      - FLASK_APP=web_app.py
      - FLASK_ENV=production

    ports:
      - "5000:5000"

    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 8G
        reservations:
          cpus: '2'
          memory: 4G

    restart: unless-stopped
    command: ["python", "web_app.py"]

  blood-cell-analyzer-cli:
    build:
      context: .
      dockerfile: Dockerfile
    image: blood-cell-analyzer:latest
    container_name: blood-cell-analyzer-cli
    profiles:
      - cli

    volumes:
      - ./data:/app/data
      - ./outputs:/app/outputs
      - ./models:/app/models

    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONPATH=/app

    restart: "no"
    entrypoint: ["/app/docker-entrypoint.sh"]
    command: ["--help"]

  blood-cell-analyzer-gpu:
    build:
      context: .
      dockerfile: Dockerfile.gpu
    image: blood-cell-analyzer:gpu
    container_name: blood-cell-analyzer-gpu

    volumes:
      - ./data:/app/data
      - ./outputs:/app/outputs
      - ./models:/app/models
      - ./uploads:/app/uploads
      - ./results:/app/results

    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONPATH=/app
      - FLASK_APP=web_app.py
      - FLASK_ENV=production
      - CUDA_VISIBLE_DEVICES=0

    ports:
      - "5000:5000"

    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

    restart: unless-stopped
    profiles:
      - gpu
    command: ["python", "web_app.py"]