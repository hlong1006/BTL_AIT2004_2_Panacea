version: '3.8'

services:
  blood-cell-analyzer:
    build:
      context: .
      dockerfile: Dockerfile
    image: blood-cell-analyzer:latest
    container_name: blood-cell-analyzer
    
    # Mount volumes
    volumes:
      # Input data
      - ./data:/app/data
      # Output results (writable)
      - ./outputs:/app/outputs
      # Models
      - ./models:/app/models
    
    # Environment variables
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONPATH=/app
      - FLASK_APP=web_app.py
      - FLASK_ENV=production
    
    # Port mapping for web interface
    ports:
      - "5000:5000"
    
    # Resource limits
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 8G
        reservations:
          cpus: '2'
          memory: 4G
    
    # Restart policy
    restart: "no"
    
    # Run Flask web app
    command: python web_app.py

  # Alternative: GPU support (if you have GPU)
  # ĐÃ XÓA CHỮ SERVICES: Ở ĐÂY. Thụt lề thẳng hàng với 'blood-cell-analyzer' ở trên.
  blood-cell-analyzer-gpu:
    build:
      context: .
      dockerfile: Dockerfile.gpu
    image: blood-cell-analyzer:gpu
    container_name: blood-cell-analyzer-gpu
    
    volumes:
      - ./data:/app/data:ro
      - ./outputs:/app/outputs
      - ./models:/app/models:ro
    
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONPATH=/app
      - CUDA_VISIBLE_DEVICES=0
    
    # GPU support
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    
    restart: "no"
    profiles:
      - gpu  # Only run with: docker compose --profile gpu up